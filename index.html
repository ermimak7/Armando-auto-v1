<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Abay Technical & Trading s.c | Tender System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASIifniUhjutQ9dDqdkEdKVT6rpmPAznc",
            authDomain: "tenderapp-6e334.firebaseapp.com",
            projectId: "tenderapp-6e334",
            storageBucket: "tenderapp-6e334.firebasestorage.app",
            messagingSenderId: "683767255208",
            appId: "1:683767255208:web:325c3af73b886f2c25729d",
            measurementId: "G-28NFNK71ML"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        tailwind.config = {
            theme: { extend: { colors: { bg: '#0f1419', card: '#1a2028', border: '#2d3640', fg: '#e8eaed', muted: '#8b949e', accent: '#d4a853', success: '#3fb950', warning: '#d29922', danger: '#f85149' } } }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        body { background: #0f1419; color: #e8eaed; scroll-behavior: smooth; }
        .status-won { background: rgba(63, 185, 80, 0.15); color: #3fb950; border: 1px solid #3fb950; }
        .status-pending { background: rgba(210, 153, 34, 0.15); color: #d29922; border: 1px solid #d29922; }
        .status-participated { background: rgba(88, 166, 255, 0.15); color: #58a6ff; border: 1px solid #58a6ff; }
        .status-canceled, .status-lost { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; }
        .section-card { background: #1a2028; border: 1px solid #2d3640; border-radius: 0.75rem; overflow: hidden; }
        input, select, textarea { background: #0f1419; border: 1px solid #2d3640; border-radius: 6px; padding: 10px; width: 100%; outline: none; margin-top: 4px; color: #e8eaed; font-size: 13px; }
        label { text-transform: uppercase; font-size: 10px; font-weight: bold; color: #8b949e; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-bg flex items-center justify-center p-4">
        <div class="bg-card border border-border p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center text-bg font-bold text-2xl mx-auto mb-4">AT</div>
                <h2 id="authTitle" class="text-2xl font-bold">Abay Technical</h2>
            </div>
            
            <div class="flex border-b border-border mb-6" id="authTabs">
                <button onclick="toggleAuth(true)" id="tabLogin" class="flex-1 pb-2 border-b-2 border-accent text-accent font-bold">Login</button>
                <button onclick="toggleAuth(false)" id="tabRegister" class="flex-1 pb-2 border-b-2 border-transparent text-muted">Register</button>
            </div>
            
            <div class="space-y-4">
                <div><label>Email</label><input type="email" id="authEmail"></div>
                <div id="passField"><label>Password</label><input type="password" id="authPass"></div>
                
                <button onclick="handleAuth()" id="authBtn" class="w-full bg-accent text-bg font-bold py-3 rounded-xl hover:opacity-0.9">Sign In</button>
                
                <!-- Forgot Password Option -->
                <div class="text-center mt-2">
                    <button onclick="forgotPassword()" class="text-[10px] text-muted hover:text-accent font-bold uppercase tracking-widest">Forgot Password?</button>
                </div>

                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-border"></div></div>
                    <div class="relative flex justify-center text-[10px] uppercase font-bold text-muted"><span class="bg-card px-2">Or</span></div>
                </div>

                <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-100 transition-all text-sm">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-4 h-4"> Google Account
                </button>
                <p id="authError" class="text-danger text-[10px] text-center mt-4 hidden"></p>
            </div>
        </div>
    </div>

    <!-- APP CONTENT -->
    <div id="appContent" class="hidden">
        <header class="border-b border-border bg-card/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-accent rounded flex items-center justify-center text-bg font-bold text-xs">AT</div>
                <h1 class="text-xs font-bold leading-none uppercase tracking-widest">Abay Technical & Trading s.c</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('emailModal').classList.remove('hidden')" class="p-2 border border-border rounded-lg text-muted hover:text-accent">📧</button>
                <button onclick="handleLogout()" class="text-[9px] text-muted hover:text-danger mx-2 uppercase font-bold">Logout</button>
                <button onclick="openModal()" class="bg-accent text-bg px-4 py-1.5 rounded-lg font-bold text-xs shadow-lg">+ Add Tender</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 mt-8 pb-12">
            <!-- Analysis Summary -->
            <div id="analysisGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>
            <!-- Stats Grid -->
            <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4 mb-8 text-center"></div>
            <!-- List -->
            <div id="tenderSections" class="space-y-8"></div>
            <!-- Summary Table -->
            <section class="section-card mt-12 p-6">
                <h3 class="text-xs font-bold text-accent uppercase tracking-widest mb-4">Monthly Summary Table</h3>
                <table class="w-full text-[11px]"><tbody id="summaryTableBody" class="divide-y divide-border/30"></tbody></table>
            </section>
        </main>
    </div>

    <!-- ADD TENDER MODAL (FIXED) -->
    <div id="tenderModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="px-6 py-4 border-b border-border flex justify-between items-center sticky top-0 bg-card z-10">
                <h3 class="font-bold text-lg">New Tender Entry</h3>
                <button onclick="closeModal()" class="text-muted text-2xl">&times;</button>
            </div>
            <form onsubmit="saveTender(event)" id="mainTenderForm" class="p-6 grid grid-cols-2 gap-4">
                <div class="col-span-2"><label>Customer Name</label><input type="text" id="tName" required></div>
                <div><label>Contact Person</label><input type="text" id="tContact"></div>
                <div><label>Phone Number</label><input type="text" id="tPhone"></div>
                <div><label>Product Type</label><select id="tProd"><option>Vehicle Maintenance</option><option>Vehicle Purchase</option><option>Vehicle Inspection</option></select></div>
                <div><label>Quantity</label><input type="number" id="tQty" value="1"></div>
                <div><label>Tender No</label><input type="text" id="tNo" required></div>
                <div><label>Deadline Date</label><input type="date" id="tDate" required></div>
                <div><label>CPO Required?</label><select id="tCPO" onchange="toggleCPO()"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                <div id="cpoWrap" class="hidden"><label>CPO Amount</label><input type="number" id="tCPOVal"></div>
                <div><label>Financial Value</label><input type="number" id="tVal" required></div>
                <div><label>Status</label><select id="tStatus"><option>Pending</option><option>Participated</option><option>Won</option><option>Lost</option></select></div>
                <div><label>Status Reporting Date</label><select id="tRepStatus"><option>Pending</option><option>Canceled</option></select></div>
                <div class="col-span-2"><label>Remark</label><textarea id="tRemark" rows="2"></textarea></div>
                <div class="col-span-2 flex justify-end pt-4 border-t border-border"><button type="submit" class="bg-accent text-bg px-10 py-2 rounded-lg font-bold shadow-lg">Save Record</button></div>
            </form>
        </div>
    </div>

    <!-- EMAIL SETTINGS -->
    <div id="emailModal" class="fixed inset-0 bg-black/90 z-[120] hidden flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl w-full max-w-md p-6">
            <h3 class="text-sm font-bold text-accent mb-4 uppercase tracking-widest">Gmail Notifications</h3>
            <div class="space-y-4">
                <div><label>Your Gmail</label><input type="email" id="smtpUser"></div>
                <div><label>App Password</label><input type="password" id="smtpPass" placeholder="16-character code"></div>
                <div><label>Notify Recipient</label><input type="email" id="smtpTo"></div>
            </div>
            <div class="flex justify-end gap-2 mt-6"><button onclick="document.getElementById('emailModal').classList.add('hidden')" class="text-xs text-muted font-bold mr-4">Close</button><button onclick="saveConfig()" class="bg-accent text-bg px-4 py-1.5 rounded text-xs font-bold">Save</button></div>
        </div>
    </div>

    <script>
        let isLogin = true;
        let tenderData = { tenders: [], config: {} };

        // --- PASSWORD RESET ---
        async function forgotPassword() {
            const email = document.getElementById('authEmail').value;
            if(!email) return alert("Please type your email first in the box above.");
            try {
                await auth.sendPasswordResetEmail(email);
                alert("Password reset email sent! Check your inbox.");
            } catch (e) { alert(e.message); }
        }

        // --- AUTH ---
        function toggleAuth(login) {
            isLogin = login;
            document.getElementById('authTitle').innerText = login ? "Abay Technical" : "Create Account";
            document.getElementById('authBtn').innerText = login ? "Sign In" : "Register";
            document.getElementById('tabLogin').className = login ? "flex-1 pb-2 border-b-2 border-accent text-accent font-bold" : "flex-1 pb-2 border-b-2 border-transparent text-muted";
            document.getElementById('tabRegister').className = !login ? "flex-1 pb-2 border-b-2 border-accent text-accent font-bold" : "flex-1 pb-2 border-b-2 border-transparent text-muted";
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value, pass = document.getElementById('authPass').value, err = document.getElementById('authError');
            try {
                if(isLogin) await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch (e) { err.innerText = e.message; err.classList.remove('hidden'); }
        }

        async function loginWithGoogle() { try { await auth.signInWithPopup(googleProvider); } catch (e) { alert(e.message); } }
        function handleLogout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                initApp();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appContent').classList.add('hidden');
            }
        });

        // --- DATABASE ---
        function initApp() {
            db.collection("tenders").onSnapshot(snap => {
                tenderData.tenders = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                render();
            });
        }

        async function saveTender(e) {
            e.preventDefault();
            // Match exactly with the database fields
            const entry = {
                customer: document.getElementById('tName').value,
                contact: document.getElementById('tContact').value,
                phone: document.getElementById('tPhone').value,
                product: document.getElementById('tProd').value,
                qty: document.getElementById('tQty').value,
                no: document.getElementById('tNo').value,
                date: document.getElementById('tDate').value,
                cpo: document.getElementById('tCPO').value,
                cpoAmount: document.getElementById('tCPOVal').value || 0,
                value: document.getElementById('tVal').value,
                status: document.getElementById('tStatus').value,
                repStatus: document.getElementById('tRepStatus').value,
                remark: document.getElementById('tRemark').value,
                emailed: false,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                await db.collection("tenders").add(entry);
                closeModal();
            } catch (err) { alert("Save failed: " + err.message); }
        }

        function render() {
            const t = tenderData.tenders;
            const totalCPO = t.reduce((acc, curr) => acc + (Number(curr.cpoAmount) || 0), 0);
            const won = t.filter(x=>x.status==='Won').length;

            // Analysis
            document.getElementById('analysisGrid').innerHTML = `
                <div class="section-card p-5 border-l-4 border-accent"><div>TOTAL CPO (ETB)</div><div class="text-2xl font-bold text-accent">${totalCPO.toLocaleString()}</div></div>
                <div class="section-card p-5 border-l-4 border-success"><div>WIN RATE</div><div class="text-2xl font-bold text-success">${Math.round((won/t.length || 0)*100)}%</div></div>
                <div class="section-card p-5 border-l-4 border-warning"><div>PENDING</div><div class="text-2xl font-bold text-warning">${t.filter(x=>x.status==='Pending').length} Tenders</div></div>`;

            // Stats
            const stats = [
                { label: 'Total', val: t.length, color: 'fg' }, { label: 'Participated', val: t.filter(x=>x.status==='Participated').length, color: 'success' },
                { label: 'Not Part.', val: 0, color: 'muted' }, { label: 'Pending', val: t.filter(x=>x.status==='Pending').length, color: 'warning' },
                { label: 'Submitted', val: 0, color: 'info' }, { label: 'Won', val: won, color: 'success' },
                { label: 'Lost', val: t.filter(x=>x.status==='Lost').length, color: 'danger' }, { label: 'Qty', val: t.reduce((a,c)=>a+(Number(c.qty)||0),0), color: 'muted' }
            ];
            document.getElementById('statsGrid').innerHTML = stats.map(s => `<div class="bg-card border border-border p-3 rounded-xl"><div class="text-xl font-bold text-${s.color}">${s.val}</div><div class="text-[9px] uppercase font-bold text-muted mt-1">${s.label}</div></div>`).join('');

            // Monthly Groups
            const groups = {};
            t.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(x => {
                const m = new Date(x.date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                if(!groups[m]) groups[m] = []; groups[m].push(x);
            });
            document.getElementById('tenderSections').innerHTML = Object.entries(groups).map(([m, items]) => `
                <div class="section-card">
                    <div class="px-6 py-2 bg-bg/50 border-b border-border text-[10px] font-bold text-accent uppercase tracking-widest">${m}</div>
                    <table class="w-full text-[11px]"><tbody class="divide-y divide-border/30">
                        ${items.map(x => `
                            <tr class="hover:bg-bg/10">
                                <td class="px-6 py-4"><b>${x.customer}</b><br><span class="text-[9px] text-muted">${x.product} (x${x.qty})</span></td>
                                <td class="px-4 py-4 text-muted">${x.no}</td>
                                <td class="px-4 py-4 text-center"><span class="px-3 py-1 rounded-full text-[9px] font-bold uppercase status-${x.status.toLowerCase()}">${x.status}</span></td>
                                <td class="px-4 py-4 text-right font-bold text-accent">${Number(x.value).toLocaleString()}<br><span class="text-[9px] text-muted">${x.date}</span></td>
                                <td class="px-6 py-4 text-right"><button onclick="deleteTender('${x.id}')">🗑</button></td>
                            </tr>`).join('')}
                    </tbody></table></div>`).join('');

            // Summary Table
            const summary = {};
            t.forEach(x => {
                const m = new Date(x.date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                if(!summary[m]) summary[m] = { total: 0, part: 0, won: 0, val: 0 };
                summary[m].total++; if(x.status === 'Participated') summary[m].part++; if(x.status === 'Won') summary[m].won++;
                summary[m].val += Number(x.value) || 0;
            });
            document.getElementById('summaryTableBody').innerHTML = Object.entries(summary).map(([m, s]) => `
                <tr><td class="py-4 font-bold text-fg">${m}</td><td class="py-4 text-center font-bold">${s.total}</td><td class="py-4 text-center text-success">${s.part}</td><td class="py-4 text-center font-bold">${s.won}</td><td class="py-4 text-right text-accent font-bold">${s.val.toLocaleString()}</td></tr>`).join('');
        }

        function toggleCPO() { document.getElementById('cpoWrap').classList.toggle('hidden', document.getElementById('tCPO').value === 'No'); }
        function openModal() { document.getElementById('mainTenderForm').reset(); toggleCPO(); document.getElementById('tenderModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('tenderModal').classList.add('hidden'); }
        async function deleteTender(id) { if(confirm("Delete record?")) await db.collection("tenders").doc(id).delete(); }
    </script>
</body>
</html>
