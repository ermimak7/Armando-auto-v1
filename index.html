<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Abay Technical & Trading s.c | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASIifniUhjutQ9dDqdkEdKVT6rpmPAznc",
            authDomain: "tenderapp-6e334.firebaseapp.com",
            projectId: "tenderapp-6e334",
            storageBucket: "tenderapp-6e334.firebasestorage.app",
            messagingSenderId: "683767255208",
            appId: "1:683767255208:web:325c3af73b886f2c25729d",
            measurementId: "G-28NFNK71ML"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        tailwind.config = {
            theme: { extend: { colors: { bg: '#0f1419', card: '#1a2028', border: '#2d3640', fg: '#e8eaed', muted: '#8b949e', accent: '#d4a853', success: '#3fb950', warning: '#d29922', danger: '#f85149' } } }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        body { background: #0f1419; color: #e8eaed; }
        .section-card { background: #1a2028; border: 1px solid #2d3640; border-radius: 0.75rem; overflow: hidden; }
        input, select, textarea { background: #0f1419; border: 1px solid #2d3640; border-radius: 6px; padding: 10px; width: 100%; outline: none; margin-top: 4px; color: white; }
        .status-won { background: rgba(63, 185, 80, 0.15); color: #3fb950; border: 1px solid #3fb950; }
        .status-pending { background: rgba(210, 153, 34, 0.15); color: #d29922; border: 1px solid #d29922; }
    </style>
</head>
<body>

    <!-- LOGIN / REGISTER SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-bg flex items-center justify-center p-4">
        <div class="bg-card border border-border p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center text-bg font-bold text-2xl mx-auto mb-4">AT</div>
                <h2 id="authTitle" class="text-2xl font-bold">Welcome Back</h2>
                <p id="authSub" class="text-muted text-sm font-sans">Login to Abay Technical & Trading</p>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-border mb-6">
                <button onclick="toggleAuth(true)" id="tabLogin" class="flex-1 pb-2 border-b-2 border-accent text-accent font-bold">Login</button>
                <button onclick="toggleAuth(false)" id="tabRegister" class="flex-1 pb-2 border-b-2 border-transparent text-muted">Register</button>
            </div>
            
            <div class="space-y-4">
                <div><label class="text-[10px] uppercase font-bold text-muted">Email</label><input type="email" id="authEmail"></div>
                <div><label class="text-[10px] uppercase font-bold text-muted">Password</label><input type="password" id="authPass"></div>
                
                <button onclick="handleAuth()" id="mainAuthBtn" class="w-full bg-accent text-bg font-bold py-3 rounded-xl hover:opacity-90 transition-all">Sign In</button>
                
                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-border"></div></div>
                    <div class="relative flex justify-center text-[10px] uppercase font-bold text-muted"><span class="bg-card px-2">Or Continue With</span></div>
                </div>

                <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-100 transition-all">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5">
                    Google Account
                </button>

                <p id="authError" class="text-danger text-[10px] text-center mt-4 hidden"></p>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden until login) -->
    <div id="appContent" class="hidden">
        <header class="border-b border-border bg-card/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-accent rounded flex items-center justify-center text-bg font-bold text-xs">AT</div>
                <h1 class="text-xs font-bold leading-none uppercase tracking-widest">Abay Technical & Trading s.c</h1>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="handleLogout()" class="text-[10px] text-muted hover:text-danger mr-4 uppercase font-bold tracking-widest">Logout</button>
                <button onclick="openModal()" class="bg-accent text-bg px-4 py-1.5 rounded-lg font-bold text-xs shadow-lg">+ Add Tender</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 mt-8">
            <section id="analysisGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></section>
            <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4 mb-8 text-center"></div>
            <div id="tenderSections" class="space-y-8"></div>
        </main>
    </div>

    <!-- Add Tender Modal (Fields as requested) -->
    <div id="tenderModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="px-6 py-4 border-b border-border flex justify-between items-center sticky top-0 bg-card">
                <h3 class="font-bold text-lg">New Tender Entry</h3>
                <button onclick="closeModal()" class="text-muted text-2xl">&times;</button>
            </div>
            <form onsubmit="saveTender(event)" class="p-6 grid grid-cols-2 gap-4">
                <div class="col-span-2"><label class="text-[10px] font-bold text-muted">Customer Name</label><input type="text" id="tName" required></div>
                <div><label class="text-[10px] font-bold text-muted">Contact Person</label><input type="text" id="tContact"></div>
                <div><label class="text-[10px] font-bold text-muted">Phone Number</label><input type="text" id="tPhone"></div>
                <div><label class="text-[10px] font-bold text-muted">Product Type</label><select id="tProd"><option>Vehicle Maintenance</option><option>Vehicle Purchase</option><option>Vehicle Inspection</option></select></div>
                <div><label class="text-[10px] font-bold text-muted">Quantity</label><input type="number" id="tQty" value="1"></div>
                <div><label class="text-[10px] font-bold text-muted">Tender No</label><input type="text" id="tNo" required></div>
                <div><label class="text-[10px] font-bold text-muted">Deadline Date</label><input type="date" id="tDate" required></div>
                <div><label class="text-[10px] font-bold text-muted">CPO Required?</label><select id="tCPO" onchange="toggleCPO()"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                <div id="cpoWrap" class="hidden"><label class="text-[10px] font-bold text-muted">CPO Amount</label><input type="number" id="tCPOVal"></div>
                <div><label class="text-[10px] font-bold text-muted">Financial Value</label><input type="number" id="tVal" required></div>
                <div><label class="text-[10px] font-bold text-muted">Status</label><select id="tStatus"><option>Pending</option><option>Participated</option><option>Won</option><option>Lost</option></select></div>
                <div><label class="text-[10px] font-bold text-muted">Status Reporting Date</label><select id="tRepStatus"><option>Pending</option><option>Canceled</option></select></div>
                <div class="col-span-2"><label class="text-[10px] font-bold text-muted">Remark</label><textarea id="tRemark" rows="2"></textarea></div>
                <div class="col-span-2 flex justify-end pt-4 border-t border-border"><button type="submit" class="bg-accent text-bg px-10 py-2 rounded-lg font-bold">Save Tender</button></div>
            </form>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let tenderData = { tenders: [] };

        // --- AUTH UI ---
        function toggleAuth(login) {
            isLoginMode = login;
            document.getElementById('authTitle').innerText = login ? "Welcome Back" : "Create Account";
            document.getElementById('mainAuthBtn').innerText = login ? "Sign In" : "Register Now";
            document.getElementById('tabLogin').className = login ? "flex-1 pb-2 border-b-2 border-accent text-accent font-bold" : "flex-1 pb-2 border-b-2 border-transparent text-muted";
            document.getElementById('tabRegister').className = !login ? "flex-1 pb-2 border-b-2 border-accent text-accent font-bold" : "flex-1 pb-2 border-b-2 border-transparent text-muted";
        }

        // --- AUTH ACTIONS ---
        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            const err = document.getElementById('authError');
            try {
                if(isLoginMode) await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
                err.classList.add('hidden');
            } catch (e) { err.innerText = e.message; err.classList.remove('hidden'); }
        }

        async function loginWithGoogle() {
            try { await auth.signInWithPopup(provider); } 
            catch (e) { alert("Google Sign-In Error: " + e.message); }
        }

        function handleLogout() { auth.signOut(); }

        // --- APP INITIALIZATION ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                initApp();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appContent').classList.add('hidden');
            }
        });

        function initApp() {
            db.collection("tenders").orderBy("date", "desc").onSnapshot((snapshot) => {
                tenderData.tenders = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                render();
            });
        }

        // --- DASHBOARD RENDERING ---
        function render() {
            const t = tenderData.tenders;
            const totalCPO = t.reduce((acc, curr) => acc + (Number(curr.cpoAmount) || 0), 0);
            const won = t.filter(x=>x.status==='Won').length;

            document.getElementById('analysisGrid').innerHTML = `
                <div class="section-card p-5 border-l-4 border-accent"><div>CPO TOTAL</div><div class="text-2xl font-bold text-accent">${totalCPO.toLocaleString()} ETB</div></div>
                <div class="section-card p-5 border-l-4 border-success"><div>SUCCESS RATE</div><div class="text-2xl font-bold text-success">${Math.round((won/t.length || 0)*100)}%</div></div>
                <div class="section-card p-5 border-l-4 border-warning"><div>PENDING</div><div class="text-2xl font-bold text-warning">${t.filter(x=>x.status==='Pending').length} Tenders</div></div>`;

            const stats = [
                { label: 'Total', val: t.length, color: 'fg' },
                { label: 'Participated', val: t.filter(x=>x.status==='Participated').length, color: 'success' },
                { label: 'Pending', val: t.filter(x=>x.status==='Pending').length, color: 'warning' },
                { label: 'Won', val: won, color: 'success' },
                { label: 'Lost', val: t.filter(x=>x.status==='Lost').length, color: 'danger' },
                { label: 'Total Qty', val: t.reduce((a,c)=>a+(Number(c.qty)||0),0), color: 'muted' }
            ];
            document.getElementById('statsGrid').innerHTML = stats.map(s => `<div class="bg-card border border-border p-3 rounded-xl"><div class="text-xl font-bold text-${s.color}">${s.val}</div><div class="text-[9px] uppercase font-bold text-muted mt-1">${s.label}</div></div>`).join('');

            const groups = {};
            t.forEach(x => {
                const m = new Date(x.date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                if(!groups[m]) groups[m] = []; groups[m].push(x);
            });
            document.getElementById('tenderSections').innerHTML = Object.entries(groups).map(([m, items]) => `
                <div class="section-card">
                    <div class="px-6 py-2 bg-bg/50 border-b border-border text-[10px] font-bold text-accent uppercase tracking-widest">${m}</div>
                    <table class="w-full text-[11px]"><tbody class="divide-y divide-border/30">
                        ${items.map(x => `
                            <tr class="hover:bg-bg/10">
                                <td class="px-6 py-4"><b>${x.customer}</b><br><span class="text-[9px] text-muted">${x.product} (x${x.qty})</span></td>
                                <td class="px-4 py-4 text-muted">${x.no}</td>
                                <td class="px-4 py-4 text-center"><span class="px-3 py-1 rounded-full text-[9px] font-bold uppercase status-${x.status.toLowerCase()}">${x.status}</span></td>
                                <td class="px-4 py-4 text-right font-bold text-accent">${Number(x.value).toLocaleString()}<br><span class="text-[9px] text-muted">${x.date}</span></td>
                                <td class="px-6 py-4 text-right"><button onclick="deleteTender('${x.id}')">🗑</button></td>
                            </tr>`).join('')}
                    </tbody></table></div>`).join('');
        }

        // --- FORM LOGIC ---
        async function saveTender(e) {
            e.preventDefault();
            const entry = {
                customer: document.getElementById('tName').value,
                contact: document.getElementById('tContact').value,
                phone: document.getElementById('tPhone').value,
                product: document.getElementById('tProd').value,
                qty: document.getElementById('tQty').value,
                no: document.getElementById('tNo').value,
                date: document.getElementById('tDate').value,
                cpo: document.getElementById('tCPO').value,
                cpoAmount: document.getElementById('tCPOVal').value || 0,
                value: document.getElementById('tVal').value,
                status: document.getElementById('tStatus').value,
                repStatus: document.getElementById('tRepStatus').value,
                remark: document.getElementById('tRemark').value
            };
            await db.collection("tenders").add(entry);
            closeModal();
        }

        function toggleCPO() { document.getElementById('cpoWrap').classList.toggle('hidden', document.getElementById('tCPO').value === 'No'); }
        function openModal() { document.getElementById('tenderForm').reset(); toggleCPO(); document.getElementById('tenderModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('tenderModal').classList.add('hidden'); }
        async function deleteTender(id) { if(confirm("Delete record?")) await db.collection("tenders").doc(id).delete(); }
    </script>
</body>
</html>
