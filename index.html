<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for APK: Prevents zooming and sets mobile scale -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abay Technical & Trading s.c | Tender System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    
    <!-- Export Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASIifniUhjutQ9dDqdkEdKVT6rpmPAznc",
            authDomain: "tenderapp-6e334.firebaseapp.com",
            projectId: "tenderapp-6e334",
            storageBucket: "tenderapp-6e334.firebasestorage.app",
            messagingSenderId: "683767255208",
            appId: "1:683767255208:web:325c3af73b886f2c25729d",
            measurementId: "G-28NFNK71ML"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        tailwind.config = {
            theme: { extend: { colors: { bg: '#0f1419', card: '#1a2028', border: '#2d3640', fg: '#e8eaed', muted: '#8b949e', accent: '#d4a853', success: '#3fb950', warning: '#d29922', danger: '#f85149' } } }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        body { background: #0f1419; color: #e8eaed; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* Status Pill Colors */
        .status-won { background: rgba(63, 185, 80, 0.15); color: #3fb950; border: 1px solid #3fb950; }
        .status-pending { background: rgba(210, 153, 34, 0.15); color: #d29922; border: 1px solid #d29922; }
        .status-participated { background: rgba(88, 166, 255, 0.15); color: #58a6ff; border: 1px solid #58a6ff; }
        .status-not-participated { background: rgba(139, 148, 158, 0.15); color: #8b949e; border: 1px solid #8b949e; }
        .status-canceled, .status-lost { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; }
        
        .section-card { background: #1a2028; border: 1px solid #2d3640; border-radius: 0.75rem; overflow: hidden; }
        
        /* Sidebar transition for mobile */
        .side-menu { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; }
        .side-menu.closed { transform: translateX(-100%); }
        
        /* Responsive input padding for mobile */
        input, select, textarea { background: #0f1419; border: 1px solid #2d3640; border-radius: 8px; padding: 12px; width: 100%; color: #e8eaed; font-size: 14px; outline: none; }
        label { text-transform: uppercase; font-size: 10px; font-weight: bold; color: #8b949e; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-[200] bg-bg flex items-center justify-center p-4">
        <div class="bg-card border border-border p-6 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center text-bg font-bold text-2xl mx-auto mb-4">AT</div>
                <h2 id="authTitle" class="text-2xl font-bold italic text-fg">Abay Technical</h2>
            </div>
            <div class="flex border-b border-border mb-6">
                <button onclick="toggleAuth(true)" id="tabLogin" class="flex-1 pb-2 border-b-2 border-accent text-accent font-bold text-sm">Login</button>
                <button onclick="toggleAuth(false)" id="tabRegister" class="flex-1 pb-2 border-b-2 border-transparent text-muted font-bold text-sm">Register</button>
            </div>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email Address">
                <input type="password" id="authPass" placeholder="Password">
                <button onclick="handleAuth()" class="w-full bg-accent text-bg font-bold py-4 rounded-xl hover:opacity-90">Sign In</button>
                <button onclick="forgotPassword()" class="w-full text-[10px] text-muted uppercase font-bold text-center">Forgot Password?</button>
            </div>
        </div>
    </div>

    <!-- SIDE MENU (Mobile Drawer) -->
    <div id="sideMenu" class="side-menu closed fixed inset-y-0 left-0 z-[150] bg-card border-r border-border shadow-2xl p-6">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-accent rounded flex items-center justify-center text-bg font-bold">AT</div>
                <h2 class="font-bold text-sm tracking-widest text-fg">MENU</h2>
            </div>
            <button onclick="toggleSidebar()" class="text-muted text-xl">✕</button>
        </div>
        <nav class="space-y-6">
            <button onclick="toggleSidebar()" class="flex items-center gap-4 text-accent font-bold w-full"><span class="text-lg">📊</span> Dashboard</button>
            <button onclick="document.getElementById('emailModal').classList.remove('hidden'); toggleSidebar();" class="flex items-center gap-4 text-muted hover:text-fg w-full text-sm uppercase font-bold tracking-widest">📧 Notifications</button>
            <hr class="border-border">
            <p class="text-[10px] text-muted uppercase font-bold tracking-widest">Export Tools</p>
            <button onclick="exportExcel()" class="flex items-center gap-4 text-success font-medium w-full text-sm"><span>📗</span> Export Excel</button>
            <button onclick="exportPDF()" class="flex items-center gap-4 text-danger font-medium w-full text-sm"><span>📕</span> Export PDF</button>
            <hr class="border-border">
            <button onclick="auth.signOut()" class="flex items-center gap-4 text-muted hover:text-danger w-full text-sm font-bold uppercase"><span>🚪</span> Logout</button>
        </nav>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="appContent" class="hidden">
        <header class="border-b border-border bg-card/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-bg rounded-lg text-muted hover:text-fg">☰</button>
                <h1 class="text-xs font-bold leading-none tracking-widest uppercase hidden md:block text-fg">Abay Technical & Trading s.c</h1>
            </div>
            <div class="flex gap-2">
                <!-- File Dropdown -->
                <div class="relative group">
                    <button class="bg-card border border-border text-muted px-4 py-2 rounded-lg font-bold text-xs hover:text-accent">File ▾</button>
                    <div class="absolute right-0 top-full mt-2 w-48 bg-card border border-border rounded-xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 overflow-hidden">
                        <button onclick="exportExcel()" class="w-full text-left px-4 py-3 text-xs text-fg hover:bg-bg border-b border-border">Export Excel</button>
                        <button onclick="exportPDF()" class="w-full text-left px-4 py-3 text-xs text-fg hover:bg-bg">Export PDF</button>
                    </div>
                </div>
                <button onclick="openModal()" class="bg-accent text-bg px-4 py-2 rounded-lg font-bold text-xs shadow-lg">+ Add Tender</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 mt-6 pb-12">
            <!-- Analysis Summary (1 Column on Mobile) -->
            <div id="analysisGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>
            
            <!-- 8-Stats Grid (2 Columns on Mobile, 8 on Desktop) -->
            <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6 text-center"></div>
            
            <div id="tenderSections" class="space-y-6"></div>
            
            <section class="section-card mt-10 p-4">
                <h3 class="text-xs font-bold text-accent uppercase tracking-widest mb-4">Monthly Summary Table</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-[11px]"><tbody id="summaryTableBody" class="divide-y divide-border/30"></tbody></table>
                </div>
            </section>
        </main>
    </div>

    <!-- TENDER MODAL (Full width on mobile) -->
    <div id="tenderModal" class="fixed inset-0 bg-black/95 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-2 md:p-4">
        <div class="bg-card border border-border rounded-xl w-full max-w-2xl max-h-[95vh] overflow-y-auto shadow-2xl">
            <div class="px-6 py-4 border-b border-border flex justify-between items-center sticky top-0 bg-card z-10">
                <h3 class="font-bold text-lg text-fg" id="modalTitle">Tender Entry</h3>
                <button onclick="closeModal()" class="text-muted hover:text-fg text-2xl">&times;</button>
            </div>
            <form onsubmit="saveTender(event)" id="tenderForm" class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="editId">
                <div class="md:col-span-2"><label>Customer Name</label><input type="text" id="tName" required></div>
                <div><label>Contact Person</label><input type="text" id="tContact"></div>
                <div><label>Phone Number</label><input type="text" id="tPhone"></div>
                <div><label>Product Type</label><select id="tProd"><option>Vehicle Maintenance</option><option>Vehicle Purchase</option><option>Vehicle Inspection</option></select></div>
                <div><label>Quantity</label><input type="number" id="tQty" value="1"></div>
                <div><label>Tender No</label><input type="text" id="tNo" required></div>
                <div><label>Deadline Date</label><input type="date" id="tDate" required></div>
                <div><label>CPO Required?</label><select id="tCPO" onchange="toggleCPO()"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                <div id="cpoWrap" class="hidden"><label>CPO Amount</label><input type="number" id="tCPOVal"></div>
                <div><label>Value (ETB)</label><input type="number" id="tVal" required></div>
                
                <!-- Main Status Dropdown (Includes Not Participated) -->
                <div>
                    <label>Main Status</label>
                    <select id="tStatus">
                        <option value="Pending">Pending</option>
                        <option value="Participated">Participated</option>
                        <option value="Not Participated">Not Participated</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>
                
                <!-- Reporting Status Dropdown (Includes Not Participated) -->
                <div>
                    <label>Reporting Status</label>
                    <select id="tRepStatus">
                        <option value="Pending">Pending</option>
                        <option value="Not Participated">Not Participated</option>
                        <option value="Canceled">Canceled</option>
                    </select>
                </div>

                <div class="md:col-span-2"><label>Remark</label><textarea id="tRemark" rows="2"></textarea></div>
                <div class="md:col-span-2 flex justify-end pt-4 border-t border-border">
                    <button type="submit" class="bg-accent text-bg px-10 py-4 rounded-xl font-bold shadow-lg w-full md:w-auto">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <!-- NOTIFICATION MODAL -->
    <div id="emailModal" class="fixed inset-0 bg-black/95 z-[120] hidden flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl w-full max-w-md p-6">
            <h3 class="text-sm font-bold text-accent mb-4 uppercase tracking-widest">Gmail Notifications</h3>
            <div class="space-y-4">
                <div><label>Gmail Address</label><input type="email" id="smtpUser" placeholder="your@gmail.com"></div>
                <div><label>App Password</label><input type="password" id="smtpPass" placeholder="16-character code"></div>
                <div><label>Recipient Email</label><input type="email" id="smtpTo" placeholder="boss@abay.com"></div>
            </div>
            <div class="flex justify-end mt-6"><button onclick="document.getElementById('emailModal').classList.add('hidden')" class="bg-accent text-bg px-6 py-3 rounded-lg font-bold text-xs">Save Settings</button></div>
        </div>
    </div>

    <script>
        let isLogin = true, tenderData = { tenders: [] };

        // UI HELPERS
        function toggleSidebar() { document.getElementById('sideMenu').classList.toggle('closed'); }
        function toggleCPO() { document.getElementById('cpoWrap').classList.toggle('hidden', document.getElementById('tCPO').value === 'No'); }
        function openModal() { document.getElementById('editId').value=''; document.getElementById('tenderForm').reset(); document.getElementById('modalTitle').innerText="New Tender Entry"; toggleCPO(); document.getElementById('tenderModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('tenderModal').classList.add('hidden'); }

        // AUTH LOGIC
        function toggleAuth(login) { isLogin = login; document.getElementById('authTitle').innerText = login ? "Abay Technical" : "Register"; }
        async function handleAuth() { const e = document.getElementById('authEmail').value, p = document.getElementById('authPass').value; try { isLogin ? await auth.signInWithEmailAndPassword(e, p) : await auth.createUserWithEmailAndPassword(e, p); } catch(err) { alert(err.message); } }
        async function forgotPassword() { const e = document.getElementById('authEmail').value; if(e) { try { await auth.sendPasswordResetEmail(e); alert("Reset link sent!"); } catch(err) { alert(err.message); } } else { alert("Type email first"); } }
        auth.onAuthStateChanged(user => { if (user) { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('appContent').classList.remove('hidden'); initApp(); } else { document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('appContent').classList.add('hidden'); } });

        // DATA LOGIC
        function initApp() { db.collection("tenders").onSnapshot(snap => { tenderData.tenders = snap.docs.map(doc => ({id: doc.id, ...doc.data()})); render(); }); }
        
        async function saveTender(ev) {
            ev.preventDefault();
            const id = document.getElementById('editId').value;
            const entry = {
                customer: document.getElementById('tName').value, contact: document.getElementById('tContact').value,
                phone: document.getElementById('tPhone').value, product: document.getElementById('tProd').value,
                qty: document.getElementById('tQty').value, no: document.getElementById('tNo').value,
                date: document.getElementById('tDate').value, cpo: document.getElementById('tCPO').value,
                cpoAmount: document.getElementById('tCPOVal').value || 0, value: document.getElementById('tVal').value,
                status: document.getElementById('tStatus').value, repStatus: document.getElementById('tRepStatus').value,
                remark: document.getElementById('tRemark').value
            };
            id ? await db.collection("tenders").doc(id).update(entry) : await db.collection("tenders").add(entry);
            closeModal();
        }

        function editTender(id) {
            const t = tenderData.tenders.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('tName').value = t.customer;
            document.getElementById('tContact').value = t.contact || '';
            document.getElementById('tPhone').value = t.phone || '';
            document.getElementById('tProd').value = t.product || 'Vehicle Maintenance';
            document.getElementById('tQty').value = t.qty || 1;
            document.getElementById('tNo').value = t.no;
            document.getElementById('tDate').value = t.date;
            document.getElementById('tCPO').value = t.cpo || 'No';
            document.getElementById('tCPOVal').value = t.cpoAmount || 0;
            document.getElementById('tVal').value = t.value;
            document.getElementById('tStatus').value = t.status;
            document.getElementById('tRepStatus').value = t.repStatus;
            document.getElementById('tRemark').value = t.remark || '';
            document.getElementById('modalTitle').innerText = "Edit Tender Entry";
            toggleCPO();
            document.getElementById('tenderModal').classList.remove('hidden');
        }

        // EXPORT LOGIC
        function exportExcel() { XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(tenderData.tenders), "Tenders"), "Abay_Report.xlsx"); }
        function exportPDF() { const doc = new jspdf.jsPDF('l', 'pt'); doc.autoTable({ head: [['Customer', 'No', 'Value', 'Status', 'Date']], body: tenderData.tenders.map(t => [t.customer, t.no, t.value, t.status, t.date]) }); doc.save("Abay_Report.pdf"); }

        // RENDER UI
        function render() {
            const t = tenderData.tenders, totalCPO = t.reduce((a,c)=>a+(Number(c.cpoAmount)||0),0), won = t.filter(x=>x.status==='Won').length;
            document.getElementById('analysisGrid').innerHTML = `
                <div class="section-card p-5 border-l-4 border-accent"><div>TOTAL CPO</div><div class="text-2xl font-bold text-accent">${totalCPO.toLocaleString()} ETB</div></div>
                <div class="section-card p-5 border-l-4 border-success"><div>SUCCESS RATE</div><div class="text-2xl font-bold text-success">${Math.round((won/t.length || 0)*100)}%</div></div>
                <div class="section-card p-5 border-l-4 border-warning"><div>PENDING</div><div class="text-2xl font-bold text-warning">${t.filter(x=>x.status==='Pending').length} Tenders</div></div>`;
            
            const stats = [
                {label:'Total',val:t.length,color:'fg'},
                {label:'Participated',val:t.filter(x=>x.status==='Participated').length,color:'success'},
                {label:'Not Part.',val:t.filter(x=>x.status==='Not Participated').length,color:'muted'},
                {label:'Pending',val:t.filter(x=>x.status==='Pending').length,color:'warning'},
                {label:'Submitted',val:0,color:'info'},
                {label:'Won',val:won,color:'success'},
                {label:'Lost',val:t.filter(x=>x.status==='Lost').length,color:'danger'},
                {label:'Qty',val:t.reduce((a,c)=>a+(Number(c.qty)||0),0),color:'muted'}
            ];
            document.getElementById('statsGrid').innerHTML = stats.map(s => `<div class="bg-card border border-border p-3 rounded-xl"><div class="text-xl font-bold text-${s.color}">${s.val}</div><div class="text-[9px] uppercase font-bold text-muted mt-1">${s.label}</div></div>`).join('');
            
            const groups = {}; t.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(x => { const m = new Date(x.date).toLocaleDateString('en-US',{month:'long',year:'numeric'}); if(!groups[m]) groups[m]=[]; groups[m].push(x); });
            document.getElementById('tenderSections').innerHTML = Object.entries(groups).map(([m,items]) => `<div class="section-card"><div class="px-6 py-2 bg-bg/50 border-b border-border text-[10px] font-bold text-accent uppercase tracking-widest">${m}</div><div class="overflow-x-auto"><table class="w-full text-[11px] min-w-[600px]"><tbody class="divide-y divide-border/30">${items.map(x => `<tr class="hover:bg-bg/10"><td class="px-6 py-4"><b>${x.customer}</b></td><td class="px-4 py-4 text-center"><span class="px-3 py-1 rounded-full text-[9px] font-bold uppercase status-${x.status.toLowerCase().replace(/ /g, '-')}">${x.status}</span></td><td class="px-4 py-4 text-right font-bold text-accent">${Number(x.value).toLocaleString()}</td><td class="px-6 py-4 text-right"><button onclick="editTender('${x.id}')" class="mr-4 text-muted hover:text-accent font-bold">✎</button><button onclick="deleteTender('${x.id}')" class="text-muted hover:text-danger font-bold">🗑</button></td></tr>`).join('')}</tbody></table></div></div>`).join('');

            const summary = {}; t.forEach(x => { const m = new Date(x.date).toLocaleDateString('en-US',{month:'long',year:'numeric'}); if(!summary[m]) summary[m]={total:0,part:0,won:0,val:0}; summary[m].total++; if(x.status==='Participated') summary[m].part++; if(x.status==='Won') summary[m].won++; summary[m].val += Number(x.value)||0; });
            document.getElementById('summaryTableBody').innerHTML = Object.entries(summary).map(([m,s]) => `<tr><td class="py-4 font-bold text-fg">${m}</td><td class="py-4 text-center">${s.total}</td><td class="py-4 text-center text-success">${s.part}</td><td class="py-4 text-center font-bold">${s.won}</td><td class="py-4 text-right text-accent font-bold">${s.val.toLocaleString()}</td></tr>`).join('');
        }
        async function deleteTender(id) { if(confirm("Delete record?")) await db.collection("tenders").doc(id).delete(); }
    </script>
</body>
</html>
